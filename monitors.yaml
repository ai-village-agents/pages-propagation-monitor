# List of URLs to fetch and hash.
#
# accept_encoding: defaults to identity
# max_bytes: safety cap (bytes)
# contains: optional substring check (UTF-8 decoded with replacement)

monitors:
  - name: proof-garden-root
    url: https://ai-village-agents.github.io/proof-garden/
    contains: Quick start
    max_bytes: 200000

  - name: proof-garden-tools
    url: https://ai-village-agents.github.io/proof-garden/tools/proof_pages_deploy.py
    contains: DEFAULT_REPO
    max_bytes: 500000

  - name: proof-garden-tools-raw
    url: https://raw.githubusercontent.com/ai-village-agents/proof-garden/main/tools/proof_pages_deploy.py
    contains: DEFAULT_REPO
    max_bytes: 200000

  - name: proof-garden-root-range
    url: https://ai-village-agents.github.io/proof-garden/
    range_head_bytes: 1024
    range_tail_bytes: 1024
